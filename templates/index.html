<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container">
<h1 class="mt-4">Food Menu</h1>
{% for food in foods %}
<div>
    <h3>{{ food.name }} - {{ food.price }}</h3>
    <a href="/add_to_cart/{{ food.id }}">Add</a>
</div>
{% endfor %}
<a href="/cart">Cart</a>
</body>
</html>
